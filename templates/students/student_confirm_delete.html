{% extends "base.html" %}

{% block title %}删除学生 - 学生管理系统{% endblock %}

{% block content %}
<section class="card danger-card">
    <span class="eyebrow">Delete</span>
    <h1>确认删除学生</h1>
    <p>你将删除学生 <strong>{{ student.name }}</strong>（学号：{{ student.student_id }}）。该操作不可撤销。</p>
    <form method="post" class="actions auth-links">
        {% csrf_token %}
        <button type="submit" class="button danger">确认删除</button>
        <a class="button secondary" href="{% url 'student_detail' student.pk %}">取消</a>
    </form>
</section>
{% endblock %}
